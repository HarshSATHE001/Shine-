version: '3.8'

services:
  ai:
    build: ./ai
    ports:
      - "8000:8000"
    networks:
      - edutrack-network

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - AI_SERVICE_URL=http://ai:8000
    volumes:
      - ./backend/database.sqlite:/app/database.sqlite
    depends_on:
      - ai
    networks:
      - edutrack-network

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - edutrack-network

networks:
  edutrack-network:
    driver: bridge
